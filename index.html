<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Dashboard</title>
    <script src="./index.js" defer></script>
    <script src="./chart.js" defer></script>
    <link rel="stylesheet" href="./style.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    
    <div class="login-screen">
        <button id="login-btn">Se connecter avec Spotify</button>
    </div>

    <div class="dashboard">
        <div class="spotify-profil">
            <div class="profil-first-section">
                <div class="disconnect">
                  <button class="disconnectbtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                  </button>
                </div>
                <div class="profil-infos">  
                    <img class="profil-avatar" src="" alt="avatar">
                    <div class="profil-txt">
                        <span class="profil-label">Profil</span>
                        <h1 class="profil-name">Julien</h1>
                           <span class="profil-stats">4 playlists • 177 abonnés • 15 abonnés</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="top-artists">
            <div class="top-artists-container"> 
            <h1 class="top-artists-txt">Top artistes <span class="time-value">du mois</span></h1>
            <select id="time-range">
                <option value="short_term">4 dernières semaines</option>
                <option value="medium_term">6 derniers mois</option>
                <option value="long_term">Depuis toujours</option>
            </select>
            </div>
            <span class="top-artists-label">Visibles uniquement par vous</span>
            <div class="all-top-artists">     
            </div>
        </div>

        <div class="top-tracks">
        <h2 class="top-tracks-txt">Top sons <span class="time-value">du mois</span></h2>
        <span class="top-artists-label">Visibles uniquement par vous</span>



            <div class="tracks">
                
            </div>
        </div>
    </div>
    
</body>
</html>
